<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barış Umut Altun | Business Development & Data Analyst</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
<style>
@import 'https://fonts.googleapis.com/css?family=Inconsolata';
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  box-sizing: border-box;
  background-color: #000000;
  background-image: radial-gradient(#11581E, #041607), url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
  background-repeat: no-repeat;
  background-size: cover;
  background-attachment: fixed;
  font-family: "Inconsolata", Helvetica, sans-serif;
  font-size: 1.4rem;
  color: rgba(128, 255, 128, 0.8);
  text-shadow: 0 0 1ex #33ff33, 0 0 2px rgba(255, 255, 255, 0.8);
  overflow: hidden;
}

.noise {
  pointer-events: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
  background-repeat: no-repeat;
  background-size: cover;
  z-index: -1;
  opacity: 0.02;
}

.overlay {
  pointer-events: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(180deg, rgba(0, 0, 0, 0) 0, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0) 100%);
  background-size: auto 4px;
  z-index: 1;
}

.overlay::before {
  content: "";
  pointer-events: none;
  position: absolute;
  display: block;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(0deg, transparent 0%, rgba(32, 128, 32, 0.2) 2%, rgba(32, 128, 32, 0.8) 3%, rgba(32, 128, 32, 0.2) 3%, transparent 100%);
  background-repeat: no-repeat;
  animation: scan 7.5s linear 0s infinite;
}

@keyframes scan {
  0% {
    background-position: 0 -100vh;
  }
  35%, 100% {
    background-position: 0 100vh;
  }
}

.terminal {
  box-sizing: inherit;
  position: absolute;
  height: 100%;
  width: 1050px;
  max-width: 100%;
  padding: 4rem;
  text-transform: uppercase;
  overflow-y: auto;
}

.output {
  color: rgba(128, 255, 128, 0.8);
  text-shadow: 0 0 1px rgba(51, 255, 51, 0.4), 0 0 2px rgba(255, 255, 255, 0.8);
}

.output::before {
  content: "> ";
}

a {
  color: #fff;
  text-decoration: none;
}

a::before {
  content: "[";
}

a::after {
  content: "]";
}

.errorcode {
  color: white;
}

#input-line {
  display: flex;
  margin-top: 20px;
}

#prompt {
  color: rgba(192, 255, 192, 0.8);
  text-shadow: 0 0 1px rgba(51, 255, 51, 0.4), 0 0 2px rgba(255, 255, 255, 0.8);
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  color: rgba(192, 255, 192, 0.8);
  font-family: inherit;
  font-size: inherit;
  text-shadow: 0 0 1px rgba(51, 255, 51, 0.4), 0 0 2px rgba(255, 255, 255, 0.8);
  text-transform: uppercase;
  outline: none;
  margin-left: 5px;
}

.ascii-art {
  white-space: pre;
  font-family: monospace;
  font-size: 0.75em;
  line-height: 1.3;
  color: #33ff33;
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="overlay"></div>
<div class="terminal">
  <h1>Barış Umut <span class="errorcode">Altun</span></h1>
  <p class="output">STRATEGIC BUSINESS DEVELOPMENT & COMMERCIAL ANALYTICS INTERACTIVE PORTFOLIO</p>
  <p class="output">KOMUT LISTESI ICIN 'HELP' YAZIP ENTER'A BASIN.</p>
  <div id="terminal-output"></div>
  <div id="input-line">
    <span id="prompt">B_ALTUN_SERVER$</span>
    <input type="text" id="input" autofocus>
  </div>
</div>

<script>
const terminalOutput = document.getElementById('terminal-output');
const input = document.getElementById('input');
const prompt = document.getElementById('prompt');
const terminal = document.querySelector('.terminal');

function addOutput(text) {
    const p = document.createElement('p');
    p.classList.add('output');
    p.innerHTML = text;
    terminalOutput.appendChild(p);
    terminal.scrollTop = terminal.scrollHeight;
}

const funnyResponses = [
    "Command not recognized. Did you budget for this command?",
    "Error 404: Market anomaly detected. Try a valid command.",
    "Data pipeline busy. Please stick to the official menu.",
    "Optimization error: Insufficient data variables for this query.",
    "Access granted, but command invalid. Type 'help' for corporate clearance.",
];

let lastResponseIndex = -1;

function getRandomFunnyResponse() {
    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * funnyResponses.length);
    } while (newIndex === lastResponseIndex && funnyResponses.length > 1);
    
    lastResponseIndex = newIndex;
    return funnyResponses[newIndex];
}

async function typeWriter(text, element, speed = 2) {
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text.charAt(i);
        await new Promise(resolve => setTimeout(resolve, speed));
        terminal.scrollTop = terminal.scrollHeight;
    }
}

// Barların kalktığı, tamamen proje ve yetkinlik özeti odaklı kurumsal panel
async function displayBusinessDashboard() {
    const dashboardContent = `
   +--------------------------------------------------------------------+
   |                   EXECUTIVE PERFORMANCE DASHBOARD                  |
   +--------------------------------------------------------------------+
   
   ■ ENTERPRISE PROJECT PORTFOLIO (STRATEGIC DELIVERABLES)
   ----------------------------------------------------------------------
   1. COST OPTIMIZATION PROJECT (MALİYET OPTİMİZASYONU)
      - FOCUS: MARGIN ENHANCEMENTS, COST MODELING & PRICING ARCHITECTURE.
   
   2. END-TO-END CUSTOMER EXPERIENCE (UÇTAN UCA MÜŞTERİ DENEYİMİ)
      - FOCUS: TURQUALITY PROJECT - UX OPTIMIZATION & GLOBAL COMPLIANCE.
   
   3. DIGITALIZATION IN SALES (SATIŞTA DİJİTALLEŞME)
      - FOCUS: TURQUALITY PROJECT - CRM INTEGRATION & RPA REQ. ANALYSIS.
   
   4. CUSTOMER SEGMENTATION PROJECT (MÜŞTERİ SEGMENTASYONU)
      - FOCUS: DATA-DRIVEN TARGETING & QLIK SENSE BI DATA ANALYSIS.
   
   ■ PROFESSIONAL CAPABILITIES SUMMARY (CORE SKILLS)
   ----------------------------------------------------------------------
   - DOMAIN BACKGROUND : INDUSTRIAL ENGINEERING + COMPUTER PROGRAMMING
   - SYSTEMS ARCHITYPE : SAP ERP (KEY USER), QLIK SENSE BI, CRM
   - THE BRIDGE ROLE   : BUSINESS-IT ALIGNMENT & TECHNICAL INTERPRETATION
   - COMMERCIAL ENGINE : PRICING SYSTEMS, KPI MANAGEMENT & BUDGETING
   
   ■ OPERATIONAL PROCESS MATRIX
   ----------------------------------------------------------------------
   [✓] REVENUE & PROFITABILITY ANALYSIS   [✓] ANNUAL SALES BUDGETING
   [✓] SALES COMMISSIONS/KPI LOGIC        [✓] COMMERCIAL LEAKAGE CONTROL
   +--------------------------------------------------------------------+`;

    const consoleElement = document.createElement('div');
    consoleElement.classList.add('ascii-art');
    terminalOutput.appendChild(consoleElement);

    // Yazı bloğu büyük olduğu için okuma hızını artırmak adına speed'i 2'ye düşürdüm.
    await typeWriter(dashboardContent, consoleElement, 2);

    await new Promise(resolve => setTimeout(resolve, 500));
    const finalMessage = document.createElement('p');
    finalMessage.classList.add('output');
    terminalOutput.appendChild(finalMessage);
    await typeWriter("Operational overview generated successfully. System stable.", finalMessage, 20);
}

function processCommand(command) {
    switch(command.toLowerCase()) {
        case 'help':
            return 'AVAILABLE COMMANDS: about, education, skills, experience, dashboard, clear';
        case 'about':
            return 'BARIS UMUT ALTUN IS AN INDUSTRIAL ENGINEER & COMPUTER PROGRAMMER WITH 5+ YEARS OF EXPERTISE IN BUSINESS DEVELOPMENT, STRATEGIC REPORTING, PRICING SYSTEMS, AND DIGITAL TRANSFORMATION PROJECTS.';
        case 'education':
            return 'EDUCATION BACKGROUND:<br>- DOGUS UNIVERSITY: INDUSTRIAL ENGINEERING (B.Sc. - 100% SCHOLARSHIP)<br>- AKDENIZ UNIVERSITY: COMPUTER PROGRAMMING (A.A.S.)';
        case 'skills':
            return 'CORE COMPETENCIES:<br>- DATA & BI: SAP ERP, QLIK SENSE, PYTHON, DATA SCIENCE, PROCESS SIMULATION<br>- STRATEGY: COMMERCIAL ANALYSIS, PRICING & COST MANAGEMENT, REVENUE OPTIMIZATION, BUDGET PLANNING<br>- BRIDGE ROLE: BUSINESS-IT ALIGNMENT, DIGITAL SALES PROCESSES, REQ. TRANSLATION FOR RPA/CRM';
        case 'experience':
            return 'PROFESSIONAL SUMMARY:<br>- SENIOR BUSINESS DEVELOPMENT SPECIALIST (2022 - PRESENT): MANAGING PRICING ARCHITECTURE, REVENUE ANALYSIS, AND BRIDGING THE GAP BETWEEN COMMERCIAL TEAMS AND IT DEPARTMENTS AS A KEY USER.<br>- PLANNING & OPTIMIZATION ENGINEER (2020 - 2022): WORKFORCE MANAGEMENT, SYSTEM MONITORING, KPI EVALUATION, AND PERFORMANCE REPORTING.';
        case 'dashboard':
            displayBusinessDashboard();
            return '';
        case 'clear':
            terminalOutput.innerHTML = '';
            return '';
        default:
            return getRandomFunnyResponse();
    }
}

input.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        const command = this.value;
        addOutput(`$ ${command}`);
        
        const output = processCommand(command);
        if (output) addOutput(output);

        this.value = '';
    }
});

input.focus();

terminal.addEventListener('click', function() {
    input.focus();
});
</script>
</body>
</html>
